name: Alnidal News Auto Update

on:
  schedule:
    - cron: '*/30 * * * *' # سيعمل تلقائياً كل 30 دقيقة لجلب الأخبار
  workflow_dispatch: # زر للتشغيل اليدوي

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run Scraper
        run: python scraper.py

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add index.html
          git commit -m "تحديث الأخبار تلقائياً" || exit 0
          git push

name: Alnidal News Auto Update

on:
  schedule:
    - cron: '*/30 * * * *' # تحديث تلقائي كل 30 دقيقة
  workflow_dispatch: # زر التشغيل اليدوي من تبويب Actions

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # استخدام نسخة مستقرة وحديثة

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Run Scraper
        run: python scraper.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add index.html
          git commit -m "تحديث الأخبار والصور - النضال نيوز" || exit 0
          git push

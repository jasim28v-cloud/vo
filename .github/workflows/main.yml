name: Scrape and Deploy DOKA

on:
  schedule:
    - cron: '0 */3 * * *'         # كل 3 ساعات
  workflow_dispatch:               # تشغيل يدوي
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: 📥 استنساخ المستودع
        uses: actions/checkout@v4

      - name: 🐍 إعداد بايثون
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 تثبيت المكتبات المطلوبة
        run: pip install requests

      - name: 🚀 تشغيل سكريبت الكشط
        run: python scraper.py      # ⚠️ تأكد من اسم ملفك الفعلي

      - name: 📤 رفع النتائج للمستودع
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.html stats.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 تحديث تلقائي $(date +'%Y-%m-%d %H:%M')" && git push)

      - name: ⚙️ إعداد GitHub Pages
        uses: actions/configure-pages@v4

      - name: 📎 رفع الملفات
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 🚀 النشر على GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
